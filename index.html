<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Card Vault — Exact Card Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e17;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Courier New', monospace;
            padding: 2rem 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* main container */
        .vault {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        /* heading */
        .main-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #9bc5ff, #74d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            text-align: center;
            font-style: italic;
        }

        /* card container */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        /* exact card style as screenshot */
        .card {
            background: linear-gradient(145deg, #121a2c, #0c1122);
            border-radius: 1.8rem;
            border: 1px solid #3c4f74;
            padding: 1.5rem 1.8rem;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        /* visa badge */
        .visa-badge {
            font-size: 0.75rem;
            font-weight: 700;
            color: #b2dbff;
            background: #0f253d;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        /* bank name */
        .bank-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            margin-bottom: 1.2rem;
            font-style: italic;
            text-shadow: 0 0 3px #5f9eff;
        }

        /* card number — alag alag lines mein */
        .card-number-line {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 1rem;
            letter-spacing: 2px;
            color: #e0edff;
            background: #030a18;
            display: block;
            padding: 0.3rem 0.8rem;
            border-radius: 0.6rem;
            margin-bottom: 0.5rem;
            width: fit-content;
        }

        .card-number-group {
            margin: 1rem 0;
        }

        /* exp and cvv row */
        .exp-cvv-row {
            display: flex;
            gap: 1.5rem;
            margin: 0.8rem 0;
            font-size: 0.85rem;
            color: #bdd6ff;
        }

        .exp-cvv-row span.label {
            color: #ffcb8e;
            margin-right: 0.3rem;
            font-weight: 600;
        }

        .exp-cvv-row .value {
            font-weight: 600;
            color: #eef4ff;
        }

        /* balance */
        .balance {
            font-size: 1rem;
            font-weight: 800;
            color: #c6ffa3;
            background: #0c1a28;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            margin: 0.6rem 0;
        }

        /* stock protocol line */
        .stock-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 0.8rem 0;
            padding-top: 0.6rem;
            border-top: 1px dashed #395075;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #a2b9df;
            font-weight: 600;
        }

        .stock-status {
            font-weight: 800;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            background: #2f2519;
            color: #ffc978;
            border-left: 3px solid #ffad4a;
        }

        /* buy now + price row */
        .buy-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.6rem;
        }

        .price {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FCE898, #D4FFB0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .buy-btn {
            background: linear-gradient(95deg, #136e94, #0a4462);
            border: none;
            padding: 0.4rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.75rem;
            font-family: monospace;
            color: white;
            cursor: default;
            border: 0.5px solid #5db4e0;
            box-shadow: 0 2px 6px #0a446280;
        }

        /* second card specific */
        .card:last-child .stock-status {
            background: #2f2519;
            color: #ffc978;
        }

        /* responsive */
        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .card {
                padding: 1.2rem;
            }
            .bank-name {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="vault">
    <div class="main-title">CARD VAULT</div>
    
    <div class="cards-container">
        <!-- CARD 1: SBI GOLD — exact style as screenshot (price 223, balance 2500) -->
        <div class="card">
            <div class="visa-badge">VISA</div>
            <div class="bank-name">SBI GOLD</div>
            
            <div class="card-number-group">
                <div class="card-number-line">5224</div>
                <div class="card-number-line">6388</div>
                <div class="card-number-line">2281</div>
                <div class="card-number-line">4758</div>
            </div>
            
            <div class="exp-cvv-row">
                <div><span class="label">EXP:</span> <span class="value">08/29</span></div>
                <div><span class="label">CVV:</span> <span class="value">***</span></div>
            </div>
            
            <div class="balance">BAL: ₹2,500</div>
            
            <div class="stock-line">
                <span>STOCK PROTOCOL</span>
                <span class="stock-status">OUT OF STOCK</span>
            </div>
            
            <div class="buy-row">
                <div class="price">₹223</div>
                <button class="buy-btn" disabled style="opacity:0.6; cursor:default;">SOLD OUT</button>
            </div>
        </div>

        <!-- CARD 2: HDFC PREMIUM — exact style as screenshot (balance 2520, price 155, stock 8) -->
        <div class="card">
            <div class="visa-badge">VISA</div>
            <div class="bank-name">HDFC PREMIUM</div>
            
            <div class="card-number-group">
                <div class="card-number-line">4532</div>
                <div class="card-number-line">6388</div>
                <div class="card-number-line">2281</div>
                <div class="card-number-line">5506</div>
            </div>
            
            <div class="exp-cvv-row">
                <div><span class="label">EXP:</span> <span class="value">08/29</span></div>
                <div><span class="label">CVV:</span> <span class="value">***</span></div>
            </div>
            
            <div class="balance">BAL: ₹2,520</div>
            
            <div class="stock-line">
                <span>STOCK PROTOCOL</span>
                <span class="stock-status">ONLY 8 LEFT</span>
            </div>
            
            <div class="buy-row">
                <div class="price">₹155</div>
                <button class="buy-btn">BUY NOW</button>
            </div>
        </div>
    </div>
    
    <!-- Note: stock 8 permanently, no change on click -->
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.65rem; color: #4c6e8f; font-family: monospace;">● static stock • ONLY 8 LEFT (no decrease) ●</div>
</div>

<script>
    // =====================================================
    // Sab card ka design exactly screenshot jaisa
    // Stock 8 he rahega — koi kharide ya nahi kharide, koi farak nahi
    // Buy button sirf dikhne ke liye, koi stock decrease nahi hoga
    // =====================================================
    
    const buyButtons = document.querySelectorAll('.buy-btn');
    
    // Optional: agar koi click bhi kare to sirf message dikhe, stock change nahi hoga
    // But requirement ke hisaab se "koi matlab nahi" — isliye hum sirf ek simple toast de sakte hain ya kuch nahi.
    // Main sirf visual ke liye rakhta hoon, stock 8 hi rahega permanently.
    
    const hdfcCard = document.querySelectorAll('.card')[1];
    const stockSpan = hdfcCard?.querySelector('.stock-status');
    
    // Ensure stock always shows "ONLY 8 LEFT" — permanently
    if (stockSpan && stockSpan.innerText !== 'ONLY 8 LEFT') {
        stockSpan.innerText = 'ONLY 8 LEFT';
        stockSpan.style.background = '#2f2519';
        stockSpan.style.color = '#ffc978';
    }
    
    // Buy button click par koi bhi stock change nahi hoga, bas message (optional)
    // But agar aap pure static chahiye to koi action nahi lenge.
    // Main ek gentle notification daal raha hoon, lekin stock 8 he rahega.
    
    buyButtons.forEach(btn => {
        // remove any existing listeners
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        
        if (newBtn.innerText === 'BUY NOW') {
            newBtn.addEventListener('click', (e) => {
                e.preventDefault();
                // Stock change nahi hoga — sirf dikhane ke liye alert
                // Lekin stock status "ONLY 8 LEFT" remain karega
                let toast = document.createElement('div');
                toast.innerText = '⚠️ Demo mode: Stock remains 8 (no change)';
                toast.style.position = 'fixed';
                toast.style.bottom = '20px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = '#1f2c38';
                toast.style.color = '#ffd966';
                toast.style.padding = '0.5rem 1.2rem';
                toast.style.borderRadius = '2rem';
                toast.style.fontSize = '0.7rem';
                toast.style.fontFamily = 'monospace';
                toast.style.zIndex = '9999';
                toast.style.border = '1px solid #ffaa44';
                toast.style.backdropFilter = 'blur(8px)';
                toast.style.whiteSpace = 'nowrap';
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 500);
                }, 2000);
                
                // Stock span remains exactly "ONLY 8 LEFT" — koi change nahi
                const stockSpanCheck = document.querySelectorAll('.card')[1]?.querySelector('.stock-status');
                if (stockSpanCheck && stockSpanCheck.innerText !== 'ONLY 8 LEFT') {
                    stockSpanCheck.innerText = 'ONLY 8 LEFT';
                }
            });
        } else {
            // SOLD OUT button disabled already
            newBtn.disabled = true;
            newBtn.style.opacity = '0.6';
            newBtn.style.cursor = 'default';
        }
    });
    
    // Ensure first card price and balance correct
    const firstCardBalance = document.querySelectorAll('.card')[0]?.querySelector('.balance');
    if (firstCardBalance && !firstCardBalance.innerText.includes('2,500')) {
        firstCardBalance.innerText = 'BAL: ₹2,500';
    }
    const firstCardPrice = document.querySelectorAll('.card')[0]?.querySelector('.price');
    if (firstCardPrice && firstCardPrice.innerText !== '₹223') {
        firstCardPrice.innerText = '₹223';
    }
    
    // Ensure second card balance and price correct
    const secondCardBalance = document.querySelectorAll('.card')[1]?.querySelector('.balance');
    if (secondCardBalance && !secondCardBalance.innerText.includes('2,520')) {
        secondCardBalance.innerText = 'BAL: ₹2,520';
    }
    const secondCardPrice = document.querySelectorAll('.card')[1]?.querySelector('.price');
    if (secondCardPrice && secondCardPrice.innerText !== '₹155') {
        secondCardPrice.innerText = '₹155';
    }
    
    // Permanently fix stock text for HDFC card
    const hdfcStockSpan = document.querySelectorAll('.card')[1]?.querySelector('.stock-status');
    if (hdfcStockSpan) {
        // Override any potential change
        setInterval(() => {
            if (hdfcStockSpan.innerText !== 'ONLY 8 LEFT') {
                hdfcStockSpan.innerText = 'ONLY 8 LEFT';
            }
        }, 500);
    }
    
    console.log('✓ Card design exactly as screenshot — card number alag alag lines mein, CVV ***, stock 8 permanently, koi kharide ya nahi kharide, stock same rahega');
</script>
</body>
</html>
