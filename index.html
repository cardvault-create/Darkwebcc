<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Card Vault — Real-Time Users | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0c1a, #010105);
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Premium Animated Particles Background */
        .particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(66,212,255,0.12) 0%, rgba(66,212,255,0) 70%);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .floating-emoji {
            position: absolute;
            font-size: 1.5rem;
            animation: floatEmoji linear infinite;
            opacity: 0.12;
            filter: blur(0.5px);
            pointer-events: none;
        }

        @keyframes floatEmoji {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-20vh) rotate(360deg); }
        }

        .vault {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 2;
        }

        .premium-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-section h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #A5D8FF 40%, #7BDFFF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-section p {
            font-size: 0.7rem;
            color: #5a7794;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .vx-badge-premium {
            background: linear-gradient(135deg, rgba(255,165,89,0.2), rgba(255,200,120,0.1));
            backdrop-filter: blur(10px);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid rgba(255,165,89,0.4);
            font-weight: 600;
            color: #ffc48a;
            font-size: 0.9rem;
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 0px rgba(255,165,89,0); }
            50% { box-shadow: 0 0 15px rgba(255,165,89,0.2); }
        }

        .glass-meta-premium {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .uid-premium-box {
            background: linear-gradient(135deg, rgba(10, 20, 40, 0.8), rgba(5, 10, 25, 0.9));
            backdrop-filter: blur(16px);
            border-radius: 1.2rem;
            border: 1px solid rgba(66, 212, 255, 0.3);
            padding: 0.8rem 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            animation: borderGlow 3s infinite;
        }

        @keyframes borderGlow {
            0% { border-color: rgba(66, 212, 255, 0.2); }
            50% { border-color: rgba(66, 212, 255, 0.5); }
            100% { border-color: rgba(66, 212, 255, 0.2); }
        }

        .uid-icon { font-size: 1.2rem; filter: drop-shadow(0 0 5px #5fb2ff); }
        .uid-label { font-size: 0.7rem; color: #8aa9cc; letter-spacing: 1px; }
        .uid-value { font-family: 'SF Mono', monospace; font-weight: 700; color: #7eb6ff; font-size: 1rem; background: rgba(0,0,0,0.4); padding: 0.2rem 0.8rem; border-radius: 1rem; }

        .badge-group-premium {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .premium-badge {
            background: linear-gradient(135deg, rgba(15, 25, 45, 0.85), rgba(8, 15, 28, 0.95));
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 0.6rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .premium-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s ease;
        }

        .premium-badge:hover::before { left: 100%; }
        .premium-badge:hover { transform: translateY(-2px); border-color: rgba(66, 212, 255, 0.3); }

        .badge-icon { font-size: 1.1rem; }
        .badge-text { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; }
        .badge-secure { border-left: 2px solid #ffd966; }
        .badge-secure .badge-icon { color: #ffd966; }
        .badge-secure .badge-text { color: #ffd966; }
        .badge-unverified { border-left: 2px solid #ffaa66; }
        .badge-unverified .badge-icon { color: #ffaa66; }
        .badge-unverified .badge-text { color: #ffaa66; }
        .badge-node { border-left: 2px solid #7eb6ff; }
        .badge-node .badge-icon { color: #7eb6ff; }
        .badge-node .badge-text { color: #7eb6ff; }

        .stats-premium {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .users-card-premium, .traffic-card-premium {
            background: linear-gradient(135deg, rgba(66,197,255,0.08), rgba(66,197,255,0.02));
            backdrop-filter: blur(12px);
            border-radius: 1.2rem;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            transition: all 0.3s ease;
        }

        .traffic-card-premium {
            background: linear-gradient(135deg, rgba(255,170,74,0.08), rgba(255,170,74,0.02));
            border-left: 3px solid #ffaa4a;
        }

        .users-card-premium { border-left: 3px solid #42c5ff; }
        .stat-label-premium { font-size: 0.65rem; text-transform: uppercase; color: #8aa9cc; letter-spacing: 1.5px; font-weight: 500; }
        .stat-number-premium { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, #fff, #42c5ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-number-traffic { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, #fff, #ffaa4a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .live-dot { font-size: 0.6rem; color: #6aff9e; animation: blink 1.5s infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .filter-premium {
            display: flex;
            gap: 2.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(66, 212, 255, 0.15);
            padding-bottom: 0.8rem;
        }

        .filter-premium-item {
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0.3rem 0;
            position: relative;
            color: #6a88a8;
        }

        .filter-premium-item.active { color: #ffffff; }
        .filter-premium-item.active::after {
            content: '';
            position: absolute;
            bottom: -0.85rem;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #5fb2ff, #42c5ff);
            border-radius: 2px;
        }
        .filter-premium-item.visa.active { color: #5fb2ff; }
        .filter-premium-item.master.active { color: #ff9f4a; }
        .filter-premium-item.rupay.active { color: #6fcf97; }

        .cards-premium { display: flex; flex-direction: column; gap: 1.2rem; }

        .card-premium {
            background: linear-gradient(135deg, rgba(18, 26, 45, 0.85), rgba(10, 15, 28, 0.95));
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid rgba(66, 212, 255, 0.2);
            padding: 1.5rem 1.8rem;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        .card-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(66,212,255,0.05), transparent);
            transition: left 0.6s ease;
        }

        .card-premium:hover::before { left: 100%; }
        .card-premium:hover {
            transform: translateY(-4px);
            border-color: rgba(66, 212, 255, 0.5);
            box-shadow: 0 25px 40px -15px rgba(0,0,0,0.5);
        }

        .card-header-premium { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .network-group { display: flex; align-items: center; gap: 0.6rem; }
        .network-chip { padding: 0.25rem 1rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 700; background: rgba(19, 37, 61, 0.8); color: #b2dbff; }
        .bank-name-premium { font-size: 1.3rem; font-weight: 700; color: #ffffff; letter-spacing: -0.3px; }
        .card-number-premium { font-family: 'SF Mono', monospace; font-size: 1rem; letter-spacing: 2px; background: rgba(0,0,0,0.3); display: inline-block; padding: 0.4rem 1.2rem; border-radius: 1rem; color: #e5f0ff; border: 0.5px solid rgba(67, 104, 143, 0.5); margin: 0.7rem 0; }
        .details-premium { display: flex; gap: 2rem; margin: 0.5rem 0; font-size: 0.8rem; color: #8aa9cc; }
        .details-premium span { color: #ffcb8e; margin-right: 0.3rem; font-weight: 600; }
        .balance-premium { font-weight: 700; font-size: 0.95rem; color: #b9ffa3; background: rgba(12, 26, 40, 0.5); display: inline-block; padding: 0.25rem 1rem; border-radius: 1rem; margin: 0.4rem 0; }
        .stock-premium { display: flex; justify-content: space-between; align-items: center; margin: 1rem 0 0.8rem; padding-top: 0.6rem; border-top: 1px dashed rgba(57, 80, 117, 0.4); font-size: 0.7rem; text-transform: uppercase; color: #7e9bc2; font-weight: 600; }
        .stock-badge { padding: 0.25rem 1rem; border-radius: 2rem; font-weight: 700; font-size: 0.7rem; }
        .stock-out { background: rgba(46, 26, 23, 0.7); color: #ffa084; border-left: 2px solid #ff6f52; }
        .stock-in { background: rgba(26, 47, 34, 0.7); color: #8bffa5; border-left: 2px solid #6aff9e; }
        .action-premium { display: flex; justify-content: center; align-items: center; gap: 2rem; margin-top: 1rem; }
        .price-premium { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #FCE898, #D4FFB0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-premium {
            background: linear-gradient(105deg, #136e94, #0a4462);
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 0.5px solid rgba(93, 180, 224, 0.5);
            min-width: 130px;
        }
        .btn-premium:hover:not(:disabled) { transform: scale(1.02); background: linear-gradient(105deg, #1a7ea8, #0e5577); }
        .btn-premium:disabled { background: #2a3346; border-color: #6a7c9e; cursor: not-allowed; opacity: 0.6; }

        @media (max-width: 700px) {
            .vault { padding: 1rem; }
            .glass-meta-premium { flex-direction: column; align-items: stretch; }
            .filter-premium { gap: 1.2rem; }
            .btn-premium { padding: 0.5rem 1.2rem; font-size: 0.75rem; min-width: 100px; }
            .price-premium { font-size: 1.4rem; }
            .card-premium { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="particles-bg" id="particlesBg"></div>
    <div class="floating-emojis" id="floatingEmojis"></div>

    <div class="vault">
        <div class="premium-header">
            <div class="logo-section">
                <h1>CARD VAULT</h1>
                <p>SECURE TERMINAL</p>
            </div>
            <div class="vx-badge-premium">⚡ VX | PRO</div>
        </div>

        <div class="glass-meta-premium">
            <div class="uid-premium-box">
                <span class="uid-icon">🆔</span>
                <div>
                    <div class="uid-label">UNIQUE IDENTIFIER</div>
                    <div class="uid-value" id="dynamicUID">UID-549953</div>
                </div>
            </div>
            <div class="badge-group-premium">
                <div class="premium-badge badge-secure"><span class="badge-icon">🔒</span><span class="badge-text">SECURE ACCOUNT</span></div>
                <div class="premium-badge badge-unverified"><span class="badge-icon">⚠️</span><span class="badge-text">UNVERIFIED REGISTRY</span></div>
                <div class="premium-badge badge-node"><span class="badge-icon">🌐</span><span class="badge-text">NODE: GLOBAL-01</span></div>
            </div>
        </div>

        <div class="stats-premium">
            <div class="users-card-premium">
                <span class="stat-label-premium">TERMINAL USERS</span>
                <span class="stat-number-premium" id="terminalUsersCount">0</span>
                <span class="live-dot">● LIVE</span>
            </div>
            <div class="traffic-card-premium">
                <span class="stat-label-premium">3D NETWORK TRAFFIC</span>
                <span class="stat-number-traffic" id="trafficCount">12,450</span>
                <span class="live-dot">● SYNC</span>
            </div>
        </div>

        <div class="filter-premium">
            <span class="filter-premium-item all active" data-filter="all">ALL</span>
            <span class="filter-premium-item visa" data-filter="visa">VISA</span>
            <span class="filter-premium-item master" data-filter="mastercard">MASTERCARD</span>
            <span class="filter-premium-item rupay" data-filter="rupay">RUPAY</span>
        </div>

        <div class="cards-premium" id="cardsContainer"></div>
    </div>

    <script>
        // ============================================================
        // ANIMATED BACKGROUND
        // ============================================================
        function createParticles() {
            const container = document.getElementById('particlesBg');
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 80 + 20;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 8 + 5 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        }

        function createFloatingEmojis() {
            const container = document.getElementById('floatingEmojis');
            const emojis = ['🫧', '🍂', '❄️', '🌈', '🏞️', '🍓', '🛸', '✈️', '🪙', '㊗️', '🏁', '🧿', '🧬', '🌠', '🌌', '🪩', '🔒', '⚠️', '🌐', '💎', '✨', '⭐', '💫', '🌟'];
            for (let i = 0; i < 50; i++) {
                const emoji = document.createElement('div');
                emoji.className = 'floating-emoji';
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 100 + '%';
                emoji.style.fontSize = Math.random() * 1.8 + 0.8 + 'rem';
                emoji.style.animationDuration = Math.random() * 14 + 8 + 's';
                emoji.style.animationDelay = Math.random() * 18 + 's';
                emoji.style.opacity = Math.random() * 0.15 + 0.05;
                container.appendChild(emoji);
            }
        }

        createParticles();
        createFloatingEmojis();

        // ============================================================
        // CARD DATA - 24 Cards (8 per network)
        // ============================================================
        const cardNames = [
            "SBI GOLD", "HDFC PREMIUM", "ICICI PLATINUM", "AXIS REWARDS",
            "YES BANK ELITE", "KOTAK SIGNATURE", "INDUSIND LEGEND", "CITI PREMIER"
        ];
        const prices = [263, 299, 393, 585, 856, 1150, 1780, 2000];
        const balances = [2550, 2978, 6989, 9850, 14450, 22590, 38990, 60000];

        const visaCards = [
            { number: "5224 | 6388 | 2281 | 4758", exp: "08/29" },
            { number: "4987 | 1234 | 5678 | 9012", exp: "11/27" },
            { number: "5423 | 7890 | 1234 | 5678", exp: "03/28" },
            { number: "5588 | 7766 | 4433 | 2211", exp: "05/26" },
            { number: "6072 | 8899 | 3344 | 7788", exp: "06/27" },
            { number: "6072 | 1122 | 3344 | 5566", exp: "09/28" },
            { number: "4789 | 1234 | 9876 | 5432", exp: "01/30" },
            { number: "5123 | 4567 | 8901 | 2345", exp: "12/31" }
        ];

        const masterCards = [
            { number: "5321 | 9876 | 5432 | 1098", exp: "10/30" },
            { number: "5456 | 7890 | 1234 | 5678", exp: "02/28" },
            { number: "5567 | 8901 | 2345 | 6789", exp: "07/29" },
            { number: "5678 | 9012 | 3456 | 7890", exp: "12/26" },
            { number: "5789 | 0123 | 4567 | 8901", exp: "04/27" },
            { number: "5890 | 1234 | 5678 | 9012", exp: "08/28" },
            { number: "5901 | 2345 | 6789 | 0123", exp: "11/30" },
            { number: "6012 | 3456 | 7890 | 1234", exp: "09/31" }
        ];

        const rupayCards = [
            { number: "6123 | 4567 | 8901 | 2345", exp: "03/29" },
            { number: "6234 | 5678 | 9012 | 3456", exp: "06/28" },
            { number: "6345 | 6789 | 0123 | 4567", exp: "09/27" },
            { number: "6456 | 7890 | 1234 | 5678", exp: "01/26" },
            { number: "6567 | 8901 | 2345 | 6789", exp: "10/27" },
            { number: "6678 | 9012 | 3456 | 7890", exp: "05/28" },
            { number: "6789 | 0123 | 4567 | 8901", exp: "02/30" },
            { number: "6890 | 1234 | 5678 | 9012", exp: "07/31" }
        ];

        const networks = [
            { name: "VISA", key: "visa", badgeStyle: "", icon: "💳" },
            { name: "MASTERCARD", key: "mastercard", badgeStyle: "background:#2f2a1a; color:#ffbc6e;", icon: "💠" },
            { name: "RUPAY", key: "rupay", badgeStyle: "background:#1a3a2a; color:#8bffa5;", icon: "🪙" }
        ];

        const cardsData = [visaCards, masterCards, rupayCards];

        function generateAllCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            for (let netIdx = 0; netIdx < networks.length; netIdx++) {
                const network = networks[netIdx];
                const cardDetails = cardsData[netIdx];
                
                for (let i = 0; i < cardNames.length; i++) {
                    const isSoldOut = (i === 0);
                    const price = prices[i];
                    const balance = balances[i];
                    const cardName = cardNames[i];
                    const cardInfo = cardDetails[i];
                    
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'card-premium';
                    cardDiv.setAttribute('data-network', network.key);
                    if (!isSoldOut) {
                        cardDiv.setAttribute('data-price', price);
                        cardDiv.setAttribute('data-name', cardName);
                    }
                    
                    cardDiv.innerHTML = `
                        <div class="card-header-premium">
                            <div class="network-group">
                                <span class="network-chip" style="${network.badgeStyle}">${network.name}</span>
                                <span class="bank-name-premium">${cardName}</span>
                            </div>
                            <div style="font-size:1.3rem;">${network.icon}</div>
                        </div>
                        <div><span class="card-number-premium">${cardInfo.number}</span></div>
                        <div class="details-premium">
                            <div><span>EXP:</span> ${cardInfo.exp}</div>
                            <div><span>CVV:</span> ***</div>
                        </div>
                        <div class="balance-premium">BAL: ₹${balance.toLocaleString()}</div>
                        <div class="stock-premium">
                            <span>STOCK PROTOCOL</span>
                            <span class="stock-badge ${isSoldOut ? 'stock-out' : 'stock-in'}">${isSoldOut ? 'OUT OF STOCK' : 'IN STOCK'}</span>
                        </div>
                        <div class="action-premium">
                            <div class="price-premium">₹${price}</div>
                            <button class="btn-premium ${!isSoldOut ? 'upi-btn' : ''}" ${isSoldOut ? 'disabled' : ''}>${isSoldOut ? 'SOLD OUT' : 'BUY NOW'}</button>
                        </div>
                    `;
                    container.appendChild(cardDiv);
                }
            }
        }

        generateAllCards();

        // ============================================================
        // UNIQUE UID PER NEW USER
        // ============================================================
        function generateUniqueUID() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = 'UID-';
            for (let i = 0; i < 8; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        let storedUID = localStorage.getItem('user_unique_uid');
        if (!storedUID) {
            storedUID = generateUniqueUID();
            localStorage.setItem('user_unique_uid', storedUID);
        }
        document.getElementById('dynamicUID').innerText = storedUID;

        // ============================================================
        // REAL-TIME TERMINAL USERS COUNT (REAL VISITORS)
        // TRAFFIC HIGH/LOW DYNAMIC
        // ============================================================
        (function() {
            // Unique session ID for this tab/window
            let sessionId = localStorage.getItem('cv_realtime_session');
            if (!sessionId) {
                sessionId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                localStorage.setItem('cv_realtime_session', sessionId);
            }

            // Load active users from localStorage
            let activeUsers = new Set();
            
            function loadActiveUsers() {
                const stored = localStorage.getItem('cv_realtime_users');
                if (stored) {
                    try {
                        const arr = JSON.parse(stored);
                        activeUsers = new Set(arr);
                    } catch(e) {}
                }
                // Ensure current session is in the set
                if (!activeUsers.has(sessionId)) {
                    activeUsers.add(sessionId);
                    saveActiveUsers();
                }
                return activeUsers.size;
            }

            function saveActiveUsers() {
                localStorage.setItem('cv_realtime_users', JSON.stringify(Array.from(activeUsers)));
                // Trigger storage event for cross-tab sync
                window.dispatchEvent(new StorageEvent('storage', {
                    key: 'cv_realtime_users',
                    newValue: JSON.stringify(Array.from(activeUsers))
                }));
            }

            // Cleanup stale sessions (older than 35 seconds)
            function cleanupInactiveSessions() {
                const now = Date.now();
                // Update heartbeat for this session
                localStorage.setItem('cv_heartbeat_' + sessionId, now.toString());
                
                // Check all heartbeat keys
                const allKeys = Object.keys(localStorage);
                const staleSessions = [];
                for (let key of allKeys) {
                    if (key.startsWith('cv_heartbeat_')) {
                        const sid = key.replace('cv_heartbeat_', '');
                        const lastHeartbeat = localStorage.getItem(key);
                        if (lastHeartbeat && (now - parseInt(lastHeartbeat)) > 35000) {
                            staleSessions.push(sid);
                        }
                    }
                }
                
                let changed = false;
                for (let sid of staleSessions) {
                    if (activeUsers.has(sid)) {
                        activeUsers.delete(sid);
                        changed = true;
                    }
                    localStorage.removeItem('cv_heartbeat_' + sid);
                }
                
                if (changed) {
                    saveActiveUsers();
                }
            }

            // Traffic counter - starts around 12450, goes high/low dynamically
            let trafficCounter = 12450;
            const terminalSpan = document.getElementById('terminalUsersCount');
            const trafficSpan = document.getElementById('trafficCount');
            
            function updateDisplays() {
                const userCount = activeUsers.size;
                if (terminalSpan) {
                    terminalSpan.innerText = userCount;
                    // Small animation on update
                    terminalSpan.style.transform = 'scale(1.05)';
                    setTimeout(() => { if(terminalSpan) terminalSpan.style.transform = ''; }, 200);
                }
                
                // Traffic: random high/low fluctuations (-15 to +25)
                const change = Math.floor(Math.random() * 45) - 10;
                trafficCounter = trafficCounter + change;
                // Keep traffic within realistic range
                if (trafficCounter < 11000) trafficCounter = 11000 + Math.floor(Math.random() * 500);
                if (trafficCounter > 18500) trafficCounter = 18500 - Math.floor(Math.random() * 500);
                
                if (trafficSpan) {
                    trafficSpan.innerText = trafficCounter.toLocaleString();
                    trafficSpan.style.transform = 'scale(1.02)';
                    setTimeout(() => { if(trafficSpan) trafficSpan.style.transform = ''; }, 200);
                }
            }
            
            // Initialize
            loadActiveUsers();
            cleanupInactiveSessions();
            
            // Heartbeat: send keep-alive every 10 seconds
            setInterval(() => {
                cleanupInactiveSessions();
                updateDisplays();
            }, 5000);
            
            // Listen for cross-tab updates
            window.addEventListener('storage', (e) => {
                if (e.key === 'cv_realtime_users') {
                    const newData = e.newValue;
                    if (newData) {
                        try {
                            const arr = JSON.parse(newData);
                            activeUsers = new Set(arr);
                            // Ensure current session still in set
                            if (!activeUsers.has(sessionId)) {
                                activeUsers.add(sessionId);
                                saveActiveUsers();
                            }
                            updateDisplays();
                        } catch(e) {}
                    }
                }
                if (e.key && e.key.startsWith('cv_heartbeat_')) {
                    cleanupInactiveSessions();
                    updateDisplays();
                }
            });
            
            // Simulate random new visitors (realistic)
            setInterval(() => {
                if (Math.random() < 0.3) {
                    const fakeId = 'visitor_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                    if (!activeUsers.has(fakeId)) {
                        activeUsers.add(fakeId);
                        saveActiveUsers();
                        updateDisplays();
                        // Auto-remove after 30-45 seconds
                        setTimeout(() => {
                            if (activeUsers.has(fakeId)) {
                                activeUsers.delete(fakeId);
                                saveActiveUsers();
                                updateDisplays();
                            }
                        }, 30000 + Math.random() * 15000);
                    }
                }
            }, 12000);
            
            // Update traffic every 3-5 seconds (high/low)
            setInterval(() => {
                updateDisplays();
            }, 4000);
            
            // Initial display
            updateDisplays();
            
            // Add live dot animation effect on traffic
            const liveDot = document.querySelector('.traffic-card-premium .live-dot');
            if (liveDot) {
                setInterval(() => {
                    if (trafficCounter > 16000) {
                        liveDot.style.color = '#ffaa4a';
                        liveDot.style.textShadow = '0 0 5px #ffaa4a';
                    } else if (trafficCounter < 13000) {
                        liveDot.style.color = '#42c5ff';
                        liveDot.style.textShadow = '0 0 5px #42c5ff';
                    } else {
                        liveDot.style.color = '#6aff9e';
                        liveDot.style.textShadow = '0 0 5px #6aff9e';
                    }
                }, 2000);
            }
        })();

        // ============================================================
        // UPI PAYMENT INTEGRATION
        // ============================================================
        const UPI_ID = "unabntelegrampalka@okhdfcbank";
        
        function initiateUPIPayment(amount, cardName) {
            const upiURI = `upi://pay?pa=${encodeURIComponent(UPI_ID)}&pn=Card%20Vault%20Store&am=${amount}&cu=INR&tn=Card%20Purchase%20-%20${cardName}`;
            window.location.href = upiURI;
            setTimeout(() => showToast(`💰 Please complete payment of ₹${amount} for ${cardName}`, false), 500);
        }
        
        function showToast(msg, isError = false) {
            let oldToast = document.querySelector('.custom-toast');
            if(oldToast) oldToast.remove();
            let toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.innerText = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '25px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = isError ? '#2c1b19' : '#0e2c3a';
            toast.style.border = `1px solid ${isError ? '#ff8b72' : '#3bc9ff'}`;
            toast.style.color = '#fff';
            toast.style.padding = '0.6rem 1.5rem';
            toast.style.borderRadius = '2rem';
            toast.style.fontSize = '0.8rem';
            toast.style.fontWeight = 'bold';
            toast.style.zIndex = '9999';
            toast.style.backdropFilter = 'blur(8px)';
            toast.style.whiteSpace = 'nowrap';
            toast.style.fontFamily = 'monospace';
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 3000); }, 3000);
        }
        
        setTimeout(() => {
            document.querySelectorAll('.upi-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const card = this.closest('.card-premium');
                    const price = card.getAttribute('data-price');
                    const name = card.getAttribute('data-name');
                    if (price && name) initiateUPIPayment(parseInt(price), name);
                    else showToast("❌ Error", true);
                });
            });
        }, 100);

        // ============================================================
        // FILTER FUNCTIONALITY
        // ============================================================
        const filters = document.querySelectorAll('.filter-premium-item');
        
        function filterCards(type) {
            document.querySelectorAll('.card-premium').forEach(card => {
                const network = card.getAttribute('data-network');
                if (type === 'all') card.style.display = '';
                else if (type === network) card.style.display = '';
                else card.style.display = 'none';
            });
        }
        
        filters.forEach(filter => {
            filter.addEventListener('click', function() {
                filters.forEach(f => f.classList.remove('active'));
                this.classList.add('active');
                filterCards(this.getAttribute('data-filter'));
            });
        });
        
        console.log("✅ Real-Time Terminal Users | Traffic High/Low Dynamic | 24 Cards | UPI Ready");
    </script>
</body>
</html>
